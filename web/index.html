<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>rokt-off</title>
<style>
    html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background: #0c0e14;
    }
    body {
        margin: 0;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0c0e14;
        -webkit-user-select: none;
        user-select: none;
    }
    canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }
    #join-input {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: #0c0e14;
        color: #eee8d5;
        border: 2px solid #eee8d5;
        font-family: monospace;
        font-size: 48px;
        line-height: 1;
        text-align: center;
        text-transform: uppercase;
        width: 280px;
        padding: 12px 0;
        outline: none;
        letter-spacing: 8px;
        z-index: 10;
        caret-color: #eee8d5;
        -webkit-user-select: text;
        user-select: text;
    }
</style>
</head>
<body>
<canvas id="glcanvas" tabindex='1'></canvas>
<script src="./gl.js"></script>
<script>
    // wasm-bindgen-cli emits CommonJS-style `require("env")` calls when the
    // wasm has imports under `module = "env"` (miniquad's GL bridges, of
    // which there are 107). Shim require() so those calls resolve to
    // miniquad's already-built importObject.env.
    window.require = function (name) {
        if (name === 'env') return importObject.env;
        throw new Error('require(' + name + ') is not supported');
    };

    // Read by wasm via wasm-bindgen; "" means "no room in URL".
    window.roktoff_get_room = function () {
        var m = location.search.match(/[?&]room=([A-Za-z]{1,8})/);
        return m ? m[1].toUpperCase() : "";
    };

    // Visible <input> overlay used during AppState::JoinEntry on web. Tapping
    // it summons the iOS keyboard via a real user gesture; programmatic
    // focus from inside the wasm RAF loop wouldn't satisfy the gesture
    // requirement.
    var joinInput = null;
    var joinSubmitted = false;
    window.roktoff_join_show = function () {
        if (!joinInput) {
            joinInput = document.createElement('input');
            joinInput.id = 'join-input';
            joinInput.type = 'text';
            joinInput.maxLength = 5;
            joinInput.autocapitalize = 'characters';
            joinInput.autocomplete = 'off';
            joinInput.spellcheck = false;
            joinInput.inputMode = 'text';
            joinInput.placeholder = '_____';
            joinInput.addEventListener('input', function () {
                joinInput.value = joinInput.value
                    .toUpperCase()
                    .replace(/[^A-Z]/g, '')
                    .slice(0, 5);
            });
            joinInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    joinSubmitted = true;
                    joinInput.blur();
                }
            });
            document.body.appendChild(joinInput);
        }
        joinInput.value = '';
        joinSubmitted = false;
        joinInput.style.display = '';
    };
    window.roktoff_join_hide = function () {
        if (joinInput) {
            joinInput.value = '';
            joinInput.blur();
            joinInput.style.display = 'none';
        }
        joinSubmitted = false;
    };
    window.roktoff_join_buffer = function () {
        return joinInput ? joinInput.value : '';
    };
    window.roktoff_join_take_submit = function () {
        if (joinSubmitted) {
            joinSubmitted = false;
            return true;
        }
        return false;
    };
</script>
<script src="./pkg/rokt_off_client.js"></script>
<script>
    register_plugins(plugins);
    wasm_bindgen('./pkg/rokt_off_client_bg.wasm')
        .then(() => init_plugins(plugins))
        .catch(err => console.error('[rokt-off] init failed:', err));
</script>
</body>
</html>
